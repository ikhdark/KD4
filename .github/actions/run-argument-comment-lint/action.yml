name: Run argument comment lint
description: Run the prebuilt argument-comment-lint package against codex-rs with Cargo.

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-ci

    - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      with:
        toolchain: nightly-2025-09-18
        components: llvm-tools-preview, rustc-dev, rust-src

    - name: Install Linux sandbox build dependencies
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        sudo DEBIAN_FRONTEND=noninteractive apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

    - name: Run argument comment lint on codex-rs with Cargo
      shell: bash
      run: |
        set -euo pipefail
        python_command=python3
        if [[ "${RUNNER_OS}" == "Windows" ]]; then
          python_command=python
        fi
        "${python_command}" ./tools/argument-comment-lint/run-prebuilt-linter.py
