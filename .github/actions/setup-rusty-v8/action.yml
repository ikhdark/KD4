name: setup-rusty-v8
description: Download and verify Codex-hosted rusty_v8 artifacts for Cargo targets without upstream archives.
inputs:
  target:
    description: Rust target triple that needs the Codex-hosted V8 fallback.
    required: true

runs:
  using: composite
  steps:
    - name: Configure rusty_v8 artifact overrides and verify checksums
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
      run: |
        set -euo pipefail

        version="$(
          PYTHONPATH="${GITHUB_WORKSPACE}/scripts" python3 -c \
            'from codex_package.v8 import resolved_v8_crate_version; print(resolved_v8_crate_version())'
        )"
        release_tag="rusty-v8-v${version}"
        base_url="https://github.com/openai/codex/releases/download/${release_tag}"
        binding_dir="${RUNNER_TEMP}/rusty_v8"
        archive_path="${binding_dir}/librusty_v8_release_${TARGET}.a.gz"
        binding_path="${binding_dir}/src_binding_release_${TARGET}.rs"
        checksums_path="${binding_dir}/rusty_v8_release_${TARGET}.sha256"

        mkdir -p "${binding_dir}"
        curl -fsSL "${base_url}/${archive_path##*/}" -o "${archive_path}"
        curl -fsSL "${base_url}/${binding_path##*/}" -o "${binding_path}"
        curl -fsSL "${base_url}/${checksums_path##*/}" -o "${checksums_path}"

        if [[ "$(wc -l < "${checksums_path}")" -ne 2 ]]; then
          echo "Expected exactly two checksums for ${TARGET} in ${checksums_path}" >&2
          exit 1
        fi

        if command -v sha256sum >/dev/null 2>&1; then
          (cd "${binding_dir}" && sha256sum -c "${checksums_path}")
        else
          (cd "${binding_dir}" && shasum -a 256 -c "${checksums_path}")
        fi
        echo "RUSTY_V8_ARCHIVE=${archive_path}" >> "${GITHUB_ENV}"
        echo "RUSTY_V8_SRC_BINDING_PATH=${binding_path}" >> "${GITHUB_ENV}"
