name: blob-size-policy

on:
  workflow_call:
    inputs:
      decision_id:
        required: true
        type: string
      decision_artifact:
        required: true
        type: string
    outputs:
      consumed_decision_id:
        description: Canonical CI decision consumed by this workflow
        value: ${{ jobs.decision.outputs.consumed_decision_id }}

jobs:
  decision:
    name: Verify CI decision
    runs-on: ubuntu-24.04
    outputs:
      consumed_decision_id: ${{ steps.consume.outputs.consumed_decision_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.decision_artifact }}
          path: .ci-decision
      - name: Verify exact decision artifact bytes
        id: consume
        run: >-
          python3 .github/scripts/verify_ci_decision.py
          --artifact .ci-decision/ci-decision.json
          --decision-id "${{ inputs.decision_id }}"
          --workflow blob-size-policy
  check:
    name: Blob size policy
    needs: decision
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Determine comparison range
        id: range
        shell: bash
        run: |
          set -euo pipefail

          # PRs inspect the proposed diff; main pushes inspect only the commit
          # range that just landed. Both paths feed the same blob-size checker.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base='${{ github.event.pull_request.base.sha }}'
            head='${{ github.event.pull_request.head.sha }}'
          else
            base='${{ github.event.before }}'
            head='${{ github.sha }}'
          fi

          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"

      - name: Check changed blob sizes
        env:
          BASE_SHA: ${{ steps.range.outputs.base }}
          HEAD_SHA: ${{ steps.range.outputs.head }}
        run: |
          python3 scripts/check_blob_size.py \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --max-bytes 512000 \
            --allowlist .github/blob-size-allowlist.txt

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree
