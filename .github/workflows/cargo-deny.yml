name: cargo-deny

on:
  workflow_call:
    inputs:
      decision_id:
        required: true
        type: string
      decision_artifact:
        required: true
        type: string
    outputs:
      consumed_decision_id:
        description: Canonical CI decision consumed by this workflow
        value: ${{ jobs.decision.outputs.consumed_decision_id }}

jobs:
  decision:
    name: Verify CI decision
    runs-on: ubuntu-24.04
    outputs:
      consumed_decision_id: ${{ steps.consume.outputs.consumed_decision_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.decision_artifact }}
          path: .ci-decision
      - name: Verify exact decision artifact bytes
        id: consume
        run: >-
          python3 .github/scripts/verify_ci_decision.py
          --artifact .ci-decision/ci-decision.json
          --decision-id "${{ inputs.decision_id }}"
          --workflow cargo-deny
  cargo-deny:
    needs: decision
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./codex-rs
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/setup-ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@82eb9f621fbc699dd0918f3ea06864c14cc84246 # v2
        with:
          rust-version: 1.95.0
          manifest-path: ./codex-rs/Cargo.toml

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree
