# Codespell configuration is within .codespellrc
---
name: Codespell

on:
  workflow_call:
    inputs:
      decision_id:
        required: true
        type: string
      decision_artifact:
        required: true
        type: string
    outputs:
      consumed_decision_id:
        description: Canonical CI decision consumed by this workflow
        value: ${{ jobs.decision.outputs.consumed_decision_id }}

permissions:
  contents: read

jobs:
  decision:
    name: Verify CI decision
    runs-on: ubuntu-24.04
    outputs:
      consumed_decision_id: ${{ steps.consume.outputs.consumed_decision_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.decision_artifact }}
          path: .ci-decision
      - name: Verify exact decision artifact bytes
        id: consume
        run: >-
          python3 .github/scripts/verify_ci_decision.py
          --artifact .ci-decision/ci-decision.json
          --decision-id "${{ inputs.decision_id }}"
          --workflow codespell
  codespell:
    name: Check for spelling errors
    needs: decision
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Annotate locations with typos
        uses: codespell-project/codespell-problem-matcher@b80729f885d32f78a716c2f107b4db1025001c42 # v1.1.0
      - name: Codespell
        uses: codespell-project/actions-codespell@8f01853be192eb0f849a5c7d721450e7a467c579 # v2.2
        with:
          ignore_words_file: .codespellignore

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree
