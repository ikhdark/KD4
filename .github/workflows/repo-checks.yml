name: repo-checks

on:
  workflow_call:
    inputs:
      decision_id:
        required: true
        type: string
      decision_artifact:
        required: true
        type: string
    outputs:
      consumed_decision_id:
        description: Canonical CI decision consumed by this workflow
        value: ${{ jobs.decision.outputs.consumed_decision_id }}

jobs:
  decision:
    name: Verify CI decision
    runs-on: ubuntu-24.04
    outputs:
      consumed_decision_id: ${{ steps.consume.outputs.consumed_decision_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.decision_artifact }}
          path: .ci-decision
      - name: Verify exact decision artifact bytes
        id: consume
        run: >-
          python3 .github/scripts/verify_ci_decision.py
          --artifact .ci-decision/ci-decision.json
          --decision-id "${{ inputs.decision_id }}"
          --workflow repo-checks
  build-test:
    needs: decision
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/setup-ci

      - name: Verify codex-rs Cargo manifests inherit workspace settings
        run: python3 .github/scripts/verify_cargo_workspace_manifests.py

      - name: Verify codex-tui does not import codex-core directly
        run: python3 .github/scripts/verify_tui_core_boundary.py

      - name: Test Codex package builder
        run: python3 -m unittest discover -s scripts/codex_package -p 'test_*.py'

      - name: Test standalone installer
        run: python3 -m unittest discover -s scripts/install -p 'test_*.py'

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage npm package
        id: stage_npm_package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Use a recent successful rust-release run that published the full
          # cross-platform native payload required by the npm package layout.
          # Passing the workflow URL directly avoids relying on old rust-v*
          # branches remaining discoverable via `gh run list --branch ...`.
          CODEX_VERSION=0.133.0-alpha.4
          WORKFLOW_URL="https://github.com/openai/codex/actions/runs/26201494185"
          OUTPUT_DIR="${RUNNER_TEMP}"
          python3 ./scripts/stage_npm_packages.py \
            --release-version "$CODEX_VERSION" \
            --workflow-url "$WORKFLOW_URL" \
            --package codex \
            --output-dir "$OUTPUT_DIR"
          PACK_OUTPUT="${OUTPUT_DIR}/codex-npm-${CODEX_VERSION}.tgz"
          echo "pack_output=$PACK_OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Upload staged npm package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-npm-staging
          path: ${{ steps.stage_npm_package.outputs.pack_output }}

      - name: Ensure root SOURCEMAP.md contains only ASCII and allowed Unicode
        run: ./scripts/asciicheck.py SOURCEMAP.md
      - name: Check root source map ToC
        run: python3 scripts/readme_toc.py SOURCEMAP.md

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.3"
      - name: Check formatting (run `just fmt` to fix)
        run: just fmt-check

      - name: Prettier (run `pnpm run format:fix` to fix)
        run: pnpm run format

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree
