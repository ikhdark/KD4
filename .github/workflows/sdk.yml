name: sdk

on:
  workflow_call:
    inputs:
      decision_id:
        required: true
        type: string
      decision_artifact:
        required: true
        type: string
    outputs:
      consumed_decision_id:
        description: Canonical CI decision consumed by this workflow
        value: ${{ jobs.decision.outputs.consumed_decision_id }}

jobs:
  decision:
    name: Verify CI decision
    runs-on: ubuntu-24.04
    outputs:
      consumed_decision_id: ${{ steps.consume.outputs.consumed_decision_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.decision_artifact }}
          path: .ci-decision
      - name: Verify exact decision artifact bytes
        id: consume
        run: >-
          python3 .github/scripts/verify_ci_decision.py
          --artifact .ci-decision/ci-decision.json
          --decision-id "${{ inputs.decision_id }}"
          --workflow sdk
  python-sdk:
    needs: decision
    runs-on:
      group: ${{ github.event.repository.name }}-runners
      labels: ${{ github.event.repository.name }}-linux-x64
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Test Python SDK
        shell: bash
        run: |
          set -euo pipefail

          # Run inside a glibc Linux image so dependency resolution exercises
          # the pinned manylinux runtime wheel that users install.
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/codex-python-sdk-home \
            -e UV_LINK_MODE=copy \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            -w "${GITHUB_WORKSPACE}/sdk/python" \
            python:3.12-slim \
            sh -euxc '
              python -m venv /tmp/uv
              /tmp/uv/bin/python -m pip install uv==0.11.3
              /tmp/uv/bin/uv sync --group dev --frozen
              /tmp/uv/bin/uv run --frozen --no-sync ruff check --output-format=github .
              /tmp/uv/bin/uv run --frozen --no-sync ruff format --check .
              /tmp/uv/bin/uv run --frozen --no-sync pytest
            '

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree

  sdks:
    needs: decision
    runs-on:
      group: ${{ github.event.repository.name }}-runners
      labels: ${{ github.event.repository.name }}-linux-x64
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/setup-ci

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - name: Install Linux bwrap build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Build codex with Cargo
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --manifest-path codex-rs/Cargo.toml -p codex-cli --bin codex
          codex_cargo_output_path="${CARGO_TARGET_DIR}/debug/codex"
          if [[ ! -x "${codex_cargo_output_path}" ]]; then
            echo "Unable to locate the Cargo-built codex binary at ${codex_cargo_output_path}." >&2
            exit 1
          fi

          # Stage the binary at a stable path because SDK tests spawn it many times.
          install_dir="${GITHUB_WORKSPACE}/.tmp/sdk-ci"
          mkdir -p "${install_dir}"
          install -m 755 "${codex_cargo_output_path}" "${install_dir}/codex"
          echo "CODEX_EXEC_PATH=${install_dir}/codex" >> "$GITHUB_ENV"

      - name: Warm up Cargo-built codex
        shell: bash
        run: |
          set -euo pipefail
          "${CODEX_EXEC_PATH}" --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK packages
        run: pnpm -r --filter ./sdk/typescript run build

      - name: Lint SDK packages
        run: pnpm -r --filter ./sdk/typescript run lint

      - name: Test SDK packages
        run: pnpm -r --filter ./sdk/typescript run test

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree
