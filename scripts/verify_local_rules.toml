# Special verify-local surfaces. Keep ordinary Rust ownership in cargo metadata.

[[surface]]
id = "command-safety-shape"
owned_packages = ["codex-core"]
paths = [
  "codex-rs/core/src/tools/handlers/command_shape.rs",
  "codex-rs/core/src/tools/handlers/command_shape_tests.rs",
]
test_expr = """
test(command_shape)
"""

[[surface]]
id = "command-safety-shell"
owned_packages = ["codex-core"]
paths = [
  "codex-rs/core/src/tools/handlers/shell/shell_command.rs",
  "codex-rs/core/src/tools/handlers/shell.rs",
  "codex-rs/core/src/tools/handlers/shell_tests.rs",
]
test_expr = """
test(shell_command_handler_supports_powershell_script_body_mode)
| test(test_get_command_supports_powershell_script_body_mode)
| test(runtime_encoded_powershell_uses_plain_script_for_safety)
| test(shell_command_handler)
"""

[[surface]]
id = "command-safety-unified-exec"
owned_packages = ["codex-core"]
paths = [
  "codex-rs/core/src/tools/handlers/unified_exec/exec_command.rs",
  "codex-rs/core/src/tools/handlers/unified_exec.rs",
  "codex-rs/core/src/tools/runtimes/unified_exec.rs",
]
test_expr = """
test(test_get_command_supports_powershell_script_body_mode)
| test(runtime_encoded_powershell_uses_plain_script_for_safety)
"""

[[surface]]
id = "command-safety-exec-policy"
owned_packages = ["codex-core"]
paths = [
  "codex-rs/core/src/exec_policy.rs",
  "codex-rs/core/src/exec_policy_tests.rs",
  "codex-rs/core/src/exec_policy_windows_tests.rs",
]
test_expr = """
test(opaque_powershell_commands_require_approval)
| test(exec_approval_requirement)
"""

[[surface]]
id = "app-server-schema"
owned_packages = ["codex-app-server", "codex-app-server-protocol"]
paths = [
  "codex-rs/app-server-protocol/src",
  "codex-rs/app-server-protocol/schema",
  "scripts/app_server_schema_runtime_check.py",
]
validation_command = ["just", "app-server-schema-check"]
regen_command = ["just", "app-server-schema-check-force"]
skip_owner_tests = true
# Mirrors SCHEMA_INPUTS in scripts/app_server_schema_runtime_check.py.
hash_paths = [
  "codex-rs/app-server-protocol/Cargo.toml",
  "codex-rs/protocol/Cargo.toml",
  "codex-rs/protocol/src",
]

